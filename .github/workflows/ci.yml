name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend — Build & Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: fintrack_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      - name: Build and run tests
        working-directory: backend
        env:
          SPRING_PROFILES_ACTIVE: test
          DB_URL: jdbc:postgresql://localhost:5432/fintrack_test
          DB_USERNAME: test
          DB_PASSWORD: test
          JWT_SECRET: ci-test-secret-that-is-long-enough-256-bits-required
        run: mvn clean verify

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-report
          path: backend/target/surefire-reports/

      - name: Upload JaCoCo coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-jacoco-report
          path: backend/target/site/jacoco/

  frontend:
    name: Frontend — Lint & Type-check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: frontend
        run: npm install

      - name: Type check
        working-directory: frontend
        run: npm run type-check

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Test
        working-directory: frontend
        run: npm test

      - name: No raw palette classes
        working-directory: frontend
        run: |
          if grep -rE "(text|bg|border)-(slate|zinc|gray|neutral)-[0-9]" src/ --include="*.tsx" --include="*.ts" -l; then
            echo "ERROR: raw palette color classes found — use token-backed utilities instead"
            exit 1
          fi
          echo "OK: no raw palette classes in frontend/src/"

      - name: Build
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8080
        run: npm run build

  docker:
    name: Docker — Compose Build Check
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker images
        env:
          JWT_SECRET: ci-docker-build-test-secret-not-real
        run: docker compose build --no-cache

  deploy:
    name: Deploy — Railway (gated on green main)
    runs-on: ubuntu-latest
    needs: [backend, frontend, docker]
    if: github.ref == 'refs/heads/main' && success()

    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        env:
          # RAILWAY_TOKEN must be added as a repository secret:
          # Project → Settings → Tokens → create project-scoped token → copy once
          # GitHub: Settings → Secrets and variables → Actions → New repository secret
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --detach --service personal-financial-management
