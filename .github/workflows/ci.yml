name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend — Build & Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: fintrack_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      - name: Build and run tests
        working-directory: backend
        env:
          SPRING_PROFILES_ACTIVE: test
          DB_URL: jdbc:postgresql://localhost:5432/fintrack_test
          DB_USERNAME: test
          DB_PASSWORD: test
          JWT_SECRET: ci-test-secret-that-is-long-enough-256-bits-required
        run: mvn clean verify

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-report
          path: backend/target/surefire-reports/

      - name: Upload JaCoCo coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-jacoco-report
          path: backend/target/site/jacoco/

  frontend:
    name: Frontend — Lint & Type-check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: frontend
        run: npm install

      - name: Type check
        working-directory: frontend
        run: npm run type-check

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Test
        working-directory: frontend
        run: npm test

      - name: No raw palette classes
        working-directory: frontend
        run: |
          if grep -rE "(text|bg|border)-(slate|zinc|gray|neutral)-[0-9]" src/ --include="*.tsx" --include="*.ts" -l; then
            echo "ERROR: raw palette color classes found — use token-backed utilities instead"
            exit 1
          fi
          echo "OK: no raw palette classes in frontend/src/"

      - name: Build
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8080
        run: npm run build

  mcp-server:
    name: MCP Server — Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: mcp-server
        run: npm install

      - name: Type check
        working-directory: mcp-server
        run: npm run type-check

      - name: Test
        working-directory: mcp-server
        run: npm test

      - name: Build
        working-directory: mcp-server
        run: npm run build

  mcp-integration:
    name: MCP Server — Backend Integration
    runs-on: ubuntu-latest
    needs: [backend, mcp-server]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: fintrack_mcp_it
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ping:1})'"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      - name: Build backend jar
        working-directory: backend
        run: mvn clean package -DskipTests

      - name: Start backend
        working-directory: backend
        env:
          SPRING_PROFILES_ACTIVE: test
          # application-test.yml hardcodes spring.datasource.url (for the Testcontainers-based
          # Surefire tests, where @DynamicPropertySource overrides it at the highest precedence
          # anyway). Booting the packaged jar directly has no such override, so the canonical
          # SPRING_DATASOURCE_* env vars are used here instead of the app's DB_URL placeholder --
          # as raw OS env vars they outrank any YAML file, profile-specific or not.
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/fintrack_mcp_it
          SPRING_DATASOURCE_USERNAME: test
          SPRING_DATASOURCE_PASSWORD: test
          JWT_SECRET: ci-mcp-integration-test-secret-that-is-long-enough-256-bits
          SPRING_CACHE_TYPE: redis
          SPRING_DATA_REDIS_URL: redis://localhost:6379
          SPRING_DATA_MONGODB_URI: mongodb://localhost:27017/fintrack_mcp_it
        run: |
          nohup java -jar target/*.jar > backend.log 2>&1 &
          echo "Waiting for backend to become healthy..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/actuator/health | grep -q '"status":"UP"'; then
              echo "Backend is healthy"
              exit 0
            fi
            sleep 2
          done
          echo "Backend failed to become healthy in time"
          cat backend.log
          exit 1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: mcp-server
        run: npm install

      - name: Build
        working-directory: mcp-server
        run: npm run build

      - name: Run backend integration test
        working-directory: mcp-server
        env:
          FINTRACK_TEST_BACKEND_URL: http://localhost:8080
        run: npm test

      - name: Diagnose unexplained failure (OOM check)
        if: failure()
        run: |
          echo "--- free -h ---"
          free -h || true
          echo "--- dmesg (last 50 kill/oom lines) ---"
          sudo dmesg --ctime 2>/dev/null | grep -iE "killed process|out of memory|oom" | tail -50 || echo "dmesg unavailable or no matches"
          echo "--- backend.log tail ---"
          tail -100 backend/backend.log || true

  docker:
    name: Docker — Compose Build Check
    runs-on: ubuntu-latest
    needs: [backend, frontend, mcp-server]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker images
        env:
          JWT_SECRET: ci-docker-build-test-secret-not-real
        run: docker compose build --no-cache

  deploy:
    name: Deploy — Railway (gated on green main)
    runs-on: ubuntu-latest
    needs: [backend, frontend, mcp-server, docker]
    if: github.ref == 'refs/heads/main' && success()

    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        env:
          # RAILWAY_TOKEN must be added as a repository secret:
          # Project → Settings → Tokens → create project-scoped token → copy once
          # GitHub: Settings → Secrets and variables → Actions → New repository secret
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --detach --service personal-financial-management
