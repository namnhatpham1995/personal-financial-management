spring:
  cache:
    type: simple   # No Redis needed in tests
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: false

app:
  jwt:
    secret: test-secret-that-is-long-enough-for-hmac-sha256-at-least-256-bits
    access-token-expiry-ms: 900000
    refresh-token-expiry-ms: 604800000
  cors:
    allowed-origins: http://localhost:3000
  rate-limit:
    auth-requests-per-minute: 100
