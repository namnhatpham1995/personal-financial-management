spring:
  application:
    name: fintrack
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/fintrack}
    username: ${DB_USERNAME:fintrack}
    password: ${DB_PASSWORD:fintrack}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: public
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
  cache:
    type: ${SPRING_CACHE_TYPE:simple}   # Override per profile: redis (prod/docker), simple (local/test)
  data:
    mongodb:
      uri: ${SPRING_DATA_MONGODB_URI:mongodb://localhost:27017/fintrack_vault}
    redis:
      url: ${SPRING_DATA_REDIS_URL:redis://localhost:6379}
      timeout: 2000ms
      lettuce:
        shutdown-timeout: 100ms

server:
  port: ${SERVER_PORT:8080}
  error:
    include-message: never
    include-binding-errors: never

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

logging:
  level:
    root: INFO
    com.fintrack: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] [%X{correlationId}] %-5level %logger{36} - %msg%n"

app:
  jwt:
    secret: ${JWT_SECRET:change-this-in-production-must-be-at-least-256-bits-long-secret-key}
    access-token-expiry-ms: ${JWT_ACCESS_EXPIRY_MS:900000}       # 15 min
    refresh-token-expiry-ms: ${JWT_REFRESH_EXPIRY_MS:604800000}  # 7 days
    session-idle-timeout-ms: ${JWT_SESSION_IDLE_TIMEOUT_MS:86400000}       # 24 hours
    session-absolute-timeout-ms: ${JWT_SESSION_ABSOLUTE_TIMEOUT_MS:2592000000} # 30 days
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,https://*.vercel.app}
  rate-limit:
    auth-requests-per-minute: ${RATE_LIMIT_AUTH:10}
  exchange-rate:
    base: ${EXCHANGE_RATE_BASE:USD}
    ttl-hours: ${EXCHANGE_RATE_TTL_HOURS:24}
    stale-hours: ${EXCHANGE_RATE_STALE_HOURS:48}
    provider-url: ${EXCHANGE_RATE_PROVIDER_URL:https://open.er-api.com/v6/latest}
  pat:
    enabled: ${PAT_ENABLED:true}
    requests-per-minute: ${PAT_RATE_LIMIT:60}
