services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: fintrack
      POSTGRES_USER: fintrack
      POSTGRES_PASSWORD: fintrack
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fintrack"]
      interval: 5s
      timeout: 5s
      retries: 10

  mongo:
    image: mongo:7-jammy
    environment:
      MONGO_INITDB_DATABASE: fintrack_audit
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: jdbc:postgresql://postgres:5432/fintrack
      DB_USERNAME: fintrack
      DB_PASSWORD: fintrack
      JWT_SECRET: ${JWT_SECRET}
      CORS_ALLOWED_ORIGINS: http://localhost:3000
      SPRING_DATA_MONGODB_URI: mongodb://mongo:27017/fintrack_audit
      SPRING_DATA_REDIS_URL: redis://redis:6379
      # Blank by default — the receipt ingestion agent stays dark until this and
      # agent-service's ANTHROPIC_API_KEY are both set (see agent-service block below).
      APP_AGENT_SERVICE_URL: ${APP_AGENT_SERVICE_URL:-http://agent-service:8081}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  # Receipt ingestion agent (LangGraph.js). Dark by default: defaults to LLM_PROVIDER=stub
  # (deterministic fixtures, no external calls) unless ANTHROPIC_API_KEY is provided — see
  # README for enabling it against the real Anthropic API.
  agent-service:
    build:
      context: ./agent-service
    environment:
      BACKEND_API_URL: http://backend:8080
      LLM_PROVIDER: ${LLM_PROVIDER:-stub}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-sonnet-4-5}
      CHECKPOINTER_DB_URL: postgresql://fintrack:fintrack@postgres:5432/fintrack
      PORT: 8081
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
    environment:
      NEXT_PUBLIC_API_URL: http://backend:8080
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
  mongo_data:
